name: Build Tauri bundles

# Cross-builds the Tauri app for Windows / macOS (arm64+x64) / Linux on every
# tag push (and manual dispatch). The Pi this repo lives on can't compile
# Rust+webview natively, so all packaging happens here.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,    os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu }
          - { name: macos-arm64,  os: macos-14,       target: aarch64-apple-darwin }
          - { name: macos-x64,    os: macos-13,       target: x86_64-apple-darwin }
          - { name: windows-x64,  os: windows-latest, target: x86_64-pc-windows-msvc }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev

      # `@stable` is the rolling pin documented by upstream — there is no
      # versioned release tag to target. The action itself is current.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install npm deps (root + frontend)
        run: |
          npm install
          npm --prefix frontend install

      - name: Tauri build
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: poketour-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error
