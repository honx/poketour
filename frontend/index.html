<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Poketour — Hamburg Karolinenviertel</title>
    <style>
      :root {
        color-scheme: dark;
        --pad: 14px;
        --btn-bg: rgba(20, 24, 32, 0.78);
        --btn-bg-active: rgba(60, 70, 90, 0.95);
        --btn-border: rgba(255, 255, 255, 0.35);
        --btn-fg: #fff;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #1a1a1a;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: ui-monospace, "Courier New", monospace;
        color: #eee;
      }
      #game {
        image-rendering: pixelated;
        box-shadow: 0 0 24px #000;
        max-width: 100%;
        max-height: 100%;
      }
      #game canvas {
        display: block;
        width: min(100vw, calc(100vh * 4 / 3));
        height: auto;
        max-width: 100vw;
        max-height: 100vh;
      }
      #hud {
        position: fixed; top: 8px; left: 8px;
        font-size: 12px; opacity: 0.7;
        pointer-events: none;
      }

      /* ---- touch controls ---- */
      #touch {
        position: fixed; inset: 0;
        pointer-events: none;
        display: none;
        z-index: 10;
      }
      /* Show on coarse-pointer devices (touch) OR when ?touch=1 is set */
      @media (pointer: coarse), (max-width: 720px) {
        #touch { display: block; }
        #hud { display: none; }
      }
      body.force-touch #touch { display: block; }
      body.force-touch #hud { display: none; }

      .tc-btn {
        position: absolute;
        pointer-events: auto;
        background: var(--btn-bg);
        color: var(--btn-fg);
        border: 2px solid var(--btn-border);
        border-radius: 50%;
        font-family: inherit;
        font-weight: 700;
        font-size: 22px;
        display: grid;
        place-items: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        backdrop-filter: blur(2px);
        transition: transform 60ms ease, background 60ms ease;
      }
      .tc-btn.active {
        background: var(--btn-bg-active);
        transform: scale(0.92);
      }
      .tc-btn.square { border-radius: 10px; font-size: 12px; padding: 0 8px; }

      /* D-pad bottom-left */
      .tc-dpad {
        position: absolute;
        left: calc(var(--pad) + var(--safe-left));
        bottom: calc(var(--pad) + var(--safe-bottom));
        width: 168px; height: 168px;
        pointer-events: auto;
        touch-action: none;
      }
      .tc-dpad .tc-btn {
        position: absolute;
        width: 56px; height: 56px;
        font-size: 26px;
        border-radius: 12px;
      }
      .tc-dpad .up    { top: 0;    left: 56px; }
      .tc-dpad .down  { bottom: 0; left: 56px; }
      .tc-dpad .left  { left: 0;   top: 56px; }
      .tc-dpad .right { right: 0;  top: 56px; }

      /* A / B bottom-right */
      .tc-ab {
        position: absolute;
        right: calc(var(--pad) + var(--safe-right));
        bottom: calc(var(--pad) + var(--safe-bottom));
        width: 168px; height: 168px;
      }
      .tc-ab .tc-btn { width: 64px; height: 64px; font-size: 24px; }
      .tc-ab .a { right: 0;  bottom: 24px; background: rgba(80,30,40,0.85); border-color: #ff6080; color: #ffd0d8; }
      .tc-ab .a.active { background: rgba(140,40,60,0.95); }
      .tc-ab .b { left: 0;  top: 24px; background: rgba(30,40,80,0.85); border-color: #6090ff; color: #d0d8ff; }
      .tc-ab .b.active { background: rgba(40,60,140,0.95); }

      /* Top-row utility buttons */
      .tc-top {
        position: absolute;
        top: calc(var(--pad) + env(safe-area-inset-top, 0px));
        left: 0; right: 0;
        display: flex; justify-content: center; gap: 6px;
        pointer-events: none;
      }
      .tc-top .tc-btn {
        height: 30px;
        min-width: 56px;
        position: relative;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <div id="hud">Poketour v0.1 — arrow keys to move · Z confirm · X cancel · Enter Kodex · E Settings · R Restore · M Mute</div>

    <div id="touch" aria-hidden="false">
      <div class="tc-top">
        <button class="tc-btn square" data-key="menu">KODEX</button>
        <button class="tc-btn square" data-key="settings">SET</button>
        <button class="tc-btn square" data-key="reset">RESTORE</button>
        <button class="tc-btn square" data-key="mute">MUTE</button>
      </div>
      <div class="tc-dpad" data-dpad="1" aria-label="movement pad">
        <button class="tc-btn up"    data-key="up"    aria-label="up">▲</button>
        <button class="tc-btn down"  data-key="down"  aria-label="down">▼</button>
        <button class="tc-btn left"  data-key="left"  aria-label="left">◀</button>
        <button class="tc-btn right" data-key="right" aria-label="right">▶</button>
      </div>
      <div class="tc-ab">
        <button class="tc-btn a" data-key="confirm" aria-label="confirm">A</button>
        <button class="tc-btn b" data-key="cancel"  aria-label="cancel">B</button>
      </div>
    </div>

    <script>
      // Force-show touch overlay on desktop with ?touch=1 (handy for testing)
      if (new URLSearchParams(location.search).get("touch") === "1") {
        document.body.classList.add("force-touch");
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
